<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emphora — Users</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#F0F4F8; --surface:#FFFFFF; --surface2:#F8FAFC; --border:#D0DCE8;
      --primary:#1A6BCC; --secondary:#00897B; --accent:#C2185B; --purple:#673AB7;
      --text:#0D1B2A; --muted:#7A8FA6;
      --success:#2E7D32; --warning:#E65100; --danger:#C62828; --r:10px;
    }
    [data-theme="dark"] {
      --bg:#0A0F1A; --surface:#111827; --surface2:#1A2236; --border:rgba(255,255,255,.10);
      --primary:#4D9EFF; --secondary:#26A69A; --accent:#F06292; --purple:#B388FF;
      --text:#E8F1FF; --muted:#5C7389;
      --success:#66BB6A; --warning:#FFA726; --danger:#EF5350;
    }
    body { font-family:system-ui,-apple-system,sans-serif; font-size:14px; background:var(--bg); color:var(--text); min-height:100vh; transition:background .2s,color .2s; }

    /* topbar */
    .topbar { position:sticky;top:0;z-index:50;height:50px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px; }
    .logo { font-family:Georgia,serif;font-style:italic;font-size:1.2rem;color:var(--primary);text-decoration:none; }
    .logo b { color:var(--secondary);font-weight:400; }
    .spacer { flex:1; }
    .badge { background:rgba(26,107,204,.12);color:var(--primary);border:1px solid rgba(26,107,204,.22);border-radius:20px;padding:2px 10px;font-size:.72rem;font-weight:700;white-space:nowrap; }
    .icon-btn { width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s; }
    .icon-btn:hover { color:var(--primary);border-color:var(--primary); }
    .icon-btn .material-icons-round { font-size:.95rem; }

    /* page */
    .page { max-width:1100px;margin:0 auto;padding:20px; }
    .page-hdr { display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px; }
    .page-title { font-family:Georgia,serif;font-size:1.4rem;font-weight:400;letter-spacing:-.02em; }
    .page-sub { font-size:.76rem;color:var(--muted);margin-top:2px; }
    .btn-row { display:flex;gap:8px; }

    /* buttons */
    .btn { display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--muted);font:inherit;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap; }
    .btn:hover { border-color:var(--primary);color:var(--primary); }
    .btn .material-icons-round { font-size:.9rem; }
    .btn-primary { background:var(--primary);border-color:var(--primary);color:#fff; }
    .btn-primary:hover { background:#1255A4;border-color:#1255A4;color:#fff; }
    .btn.spin .material-icons-round { animation:spin .7s linear infinite; }

    /* toolbar */
    .toolbar { display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px; }
    .search-wrap { position:relative;flex:1;min-width:160px; }
    .search-icon { position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;display:flex; }
    .search-icon .material-icons-round { font-size:.95rem; }
    input[type=search] { width:100%;padding:7px 10px 7px 30px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font:inherit;font-size:.82rem;outline:none; }
    input[type=search]:focus { border-color:var(--primary); }
    select { padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font:inherit;font-size:.8rem;cursor:pointer;outline:none; }
    select:focus { border-color:var(--primary); }
    select option { background:var(--surface); }

    /* card + table */
    .card { background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.06); }
    table { width:100%;border-collapse:collapse;font-size:.82rem; }
    thead { position:sticky;top:50px;z-index:10;background:var(--surface); }
    thead tr { border-bottom:1px solid var(--border); }
    thead th { background:var(--surface);box-shadow:0 1px 0 var(--border); }
    th { padding:9px 13px;text-align:left;font-size:.66rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);white-space:nowrap;cursor:pointer;user-select:none; }
    th:hover { color:var(--primary); }
    th.sorted { color:var(--primary); }
    th .si { font-size:.72rem;vertical-align:middle;opacity:.45; }
    th.sorted .si { opacity:1; }
    td { padding:10px 13px;border-bottom:1px solid var(--border);vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tbody tr { transition:background .1s; }
    tbody tr:hover td { background:rgba(26,107,204,.04); }
    tr.clickable-row:hover td { background:rgba(103,58,183,.06); cursor:pointer; }
    tbody tr.dim td { opacity:.4; }
    .cell-id { color:var(--muted);font-size:.7rem;font-family:monospace; }
    .cell-name { font-weight:600; }
    .cell-email { color:var(--muted);font-size:.78rem; }
    .cell-date { color:var(--muted);font-size:.72rem;white-space:nowrap; }

    .pill { display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:.68rem;font-weight:700;border:1px solid transparent; }
    .pill .material-icons-round { font-size:.72rem; }
    .pill-employee   { background:rgba(26,107,204,.1); color:var(--primary);   border-color:rgba(26,107,204,.22); }
    .pill-employer   { background:rgba(0,137,123,.1);  color:var(--secondary); border-color:rgba(0,137,123,.22);  }
    .pill-researcher { background:rgba(194,24,91,.08); color:var(--accent);    border-color:rgba(194,24,91,.2);   }

    .status { display:inline-flex;align-items:center;gap:3px;font-size:.72rem;font-weight:700; }
    .status .material-icons-round { font-size:.82rem; }
    .active-yes { color:var(--success); }
    .active-no  { color:var(--muted); }
    .ver-yes { color:var(--success);font-size:.72rem;font-weight:700; }
    .ver-no  { color:var(--muted);font-size:.72rem; }

    .sess { display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:.7rem;font-weight:700;background:rgba(26,107,204,.1);color:var(--primary); }
    .sess-zero { background:var(--bg);color:var(--muted); }

    .acts { display:flex;gap:4px; }
    .act { width:27px;height:27px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s; }
    .act .material-icons-round { font-size:.82rem;pointer-events:none; }
    .act:hover          { background:var(--surface2);color:var(--text); }
    .act-edit:hover     { background:rgba(26,107,204,.1);color:var(--primary);border-color:var(--primary); }
    .act-enable:hover   { background:rgba(46,125,50,.1);color:var(--success);border-color:var(--success); }
    .act-disable:hover  { background:rgba(230,81,0,.08);color:var(--warning);border-color:var(--warning); }
    .act-delete:hover   { background:rgba(198,40,40,.08);color:var(--danger);border-color:var(--danger); }


    /* states */
    .state { display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:3rem 1rem;color:var(--muted);font-size:.84rem;text-align:center; }
    .state .material-icons-round { font-size:2.2rem;opacity:.3; }
    .spinner { width:28px;height:28px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--primary);animation:spin .75s linear infinite; }

    /* debug */
    .debug-box { background:#FFF3E0;border:1px solid #FFB74D;border-radius:8px;padding:10px 14px;font-size:.75rem;font-family:monospace;color:#4E342E;white-space:pre-wrap;word-break:break-all;margin:8px 14px; }
    [data-theme="dark"] .debug-box { background:#1A1400;border-color:#7B6000;color:#FFE082; }

    /* footer */
    .card-footer { display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-top:1px solid var(--border);font-size:.73rem;color:var(--muted);flex-wrap:wrap;gap:6px; }

    /* modal */
    .modal-bg { position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s; }
    .modal-bg.open { opacity:1;pointer-events:all; }
    .modal { background:var(--surface);border-radius:16px;width:100%;max-width:440px;padding:1.4rem;box-shadow:0 20px 60px rgba(0,0,0,.28);transform:scale(.95);transition:transform .22s cubic-bezier(.34,1.4,.64,1); }
    .modal-bg.open .modal { transform:scale(1); }
    .modal-hdr { display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem; }
    .modal-title { font-family:Georgia,serif;font-size:1.1rem;font-weight:400; }
    .form { display:flex;flex-direction:column;gap:.6rem; }
    .form-row { display:grid;grid-template-columns:1fr 1fr;gap:.6rem; }
    @media(max-width:420px){.form-row{grid-template-columns:1fr;}}
    .field { display:flex;flex-direction:column;gap:3px; }
    label.lbl { font-size:.7rem;font-weight:700;letter-spacing:.03em;color:var(--muted); }
    .finput { padding:7px 9px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font:inherit;font-size:.82rem;outline:none; }
    .finput:focus { border-color:var(--primary); }
    .finput option { background:var(--surface); }
    .checks { display:flex;gap:12px;align-items:center;padding-top:4px; }
    .chk-label { display:flex;align-items:center;gap:5px;font-size:.78rem;cursor:pointer; }
    .chk-label input { accent-color:var(--primary);cursor:pointer;width:14px;height:14px; }
    .form-actions { display:flex;gap:8px;justify-content:flex-end;padding-top:.3rem; }
    .btn-cancel { padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font:inherit;cursor:pointer;transition:all .15s; }
    .btn-cancel:hover { border-color:var(--text);color:var(--text); }
    .btn-save { display:inline-flex;align-items:center;gap:5px;padding:7px 18px;border-radius:8px;background:var(--primary);border:none;color:#fff;font:inherit;font-size:.82rem;font-weight:700;cursor:pointer; }
    .btn-save:hover { background:#1255A4; }
    .btn-save:disabled { opacity:.55;cursor:not-allowed; }

    .back-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:.78rem;font-weight:600;text-decoration:none;transition:all .15s;}
    .back-btn:hover{border-color:#673AB7;color:#673AB7;background:rgba(103,58,183,.08);}
    .back-btn .material-icons-round{font-size:.9rem;}
    @keyframes spin   { to{transform:rotate(360deg);} }
    @keyframes fadein { from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:none;} }
    tbody tr { animation:fadein .14s ease both; }

    @media(max-width:680px){th:nth-child(6),td:nth-child(6),th:nth-child(7),td:nth-child(7){display:none;}}
    @media(max-width:480px){th:nth-child(1),td:nth-child(1),th:nth-child(5),td:nth-child(5){display:none;}}
  </style>
</head>
<body>

<nav class="topbar">
  <a href="admin.html" class="logo">Emph<b>ora</b></a>
  <a href="admin.html" class="back-btn" id="back-btn" aria-label="Back to Admin dashboard">
    <span class="material-icons-round">arrow_back</span>Admin
  </a>
  <div class="spacer"></div>
  <span class="badge" id="total-badge">loading…</span>
  <button class="icon-btn" id="theme-btn" title="Toggle theme" aria-label="Toggle theme">
    <span class="material-icons-round">light_mode</span>
  </button>
</nav>

<div class="page">
  <div class="page-hdr">
    <div>
      <h1 class="page-title">All Users</h1>
      <p class="page-sub" id="api-sub">—</p>
    </div>
    <div class="btn-row">
      <button class="btn" id="refresh-btn"><span class="material-icons-round">refresh</span> Refresh</button>
      <button class="btn btn-primary" id="add-btn"><span class="material-icons-round">person_add</span> Add User</button>
      <button class="btn" id="hide-seed-btn" style="color:var(--primary);border-color:rgba(26,107,204,.35);background:rgba(26,107,204,.06)"><span class="material-icons-round" style="font-size:.95rem">visibility_off</span> Hide Seed Pool</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon"><span class="material-icons-round">search</span></span>
      <input type="search" id="search" placeholder="Search name or email…" aria-label="Search" />
    </div>
    <select id="filter-type">
      <option value="">All types</option>
      <option value="employee">Employee</option>
      <option value="employer">Employer</option>
      <option value="researcher">Researcher</option>

    <select id="filter-status">
      <option value="">All status</option>
      <option value="1">Active</option>

    <select id="filter-verified">
      <option value="">All</option>
      <option value="1">Verified</option>
      <option value="0">Unverified</option>
    </select>

  <div class="card">
    <div id="table-wrap"><div class="state"><div class="spinner"></div><span>Loading…</span></div></div>
    <div id="debug-wrap"></div>
    <div class="card-footer">
      <span id="footer-count">—</span>
      <span id="footer-time">—</span>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="modal">
    <div class="modal-hdr">
      <h2 class="modal-title" id="modal-title">Add user</h2>
      <button class="icon-btn" id="modal-close" aria-label="Close"><span class="material-icons-round">close</span></button>
    </div>
    <form class="form" id="user-form" novalidate>
      <input type="hidden" id="f-id" />
      <div class="form-row">
        <div class="field"><label class="lbl" for="f-fname">First name *</label><input class="finput" type="text" id="f-fname" placeholder="First name" required /></div>
        <div class="field"><label class="lbl" for="f-lname">Last name *</label><input class="finput" type="text" id="f-lname" placeholder="Last name" required /></div>
      </div>
      <div class="field"><label class="lbl" for="f-email">Email *</label><input class="finput" type="email" id="f-email" placeholder="user@example.com" required /></div>
      <div class="field">
        <label class="lbl" for="f-pw">Password <span id="f-pw-hint" style="font-weight:400;opacity:.6">(min 8 chars)</span></label>
        <input class="finput" type="password" id="f-pw" placeholder="Set password" />
      </div>
      <div class="form-row">
        <div class="field">
          <label class="lbl" for="f-type">Account type</label>
          <select class="finput" id="f-type"><option value="employee">Employee</option><option value="employer">Employer</option><option value="researcher">Researcher</option></select>
        </div>
        <div class="field">
          <label class="lbl">Flags</label>
          <div class="checks">
            <label class="chk-label"><input type="checkbox" id="f-verified" /> Verified</label>
            <label class="chk-label"><input type="checkbox" id="f-active" checked /> Active</label>
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel" id="modal-cancel">Cancel</button>
        <button type="submit" class="btn-save" id="save-btn">
          <span class="material-icons-round" style="font-size:.9rem">save</span>
          <span id="save-label">Save user</span>
        </button>
      </div>
    </form>
  </div>
</div>

<script>
'use strict';

// ── API base ──────────────────────────────────────────────────────────────────
const API = window.location.protocol === 'file:' ? 'http://localhost:3001' : '';
document.getElementById('api-sub').textContent =
  `API: ${API || window.location.origin} · live from SQLite`;

// ══════════════════════════════════════════════════════════════════════════════
// TESTING FLAG — set to true to seed 50 test employees, false to remove them
// ══════════════════════════════════════════════════════════════════════════════
const TESTING = false; // ← flip to true to enable 50 test employees

// ── Test user data ────────────────────────────────────────────────────────────
const TEST_FIRST_NAMES = ['Liam','Emma','Noah','Olivia','James','Ava','Oliver','Sophia','Elijah','Isabella','William','Mia','Benjamin','Charlotte','Lucas','Amelia','Henry','Harper','Alexander','Evelyn','Mason','Abigail','Ethan','Emily','Daniel','Elizabeth','Logan','Sofia','Jackson','Avery','Sebastian','Ella','Jack','Madison','Aiden','Scarlett','Owen','Victoria','Samuel','Aria','Matthew','Grace','Joseph','Chloe','Levi','Camila','Mateo','Penelope','David','Riley'];
const TEST_LAST_NAMES  = ['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Rodriguez','Martinez','Hernandez','Lopez','Gonzalez','Wilson','Anderson','Thomas','Taylor','Moore','Jackson','Martin','Lee','Perez','Thompson','White','Harris','Sanchez','Clark','Ramirez','Lewis','Robinson','Walker','Young','Allen','King','Wright','Scott','Torres','Nguyen','Hill','Flores','Green','Adams','Nelson','Baker','Hall','Rivera','Campbell','Mitchell','Carter','Roberts'];
const TEST_CATEGORIES = [
  'Programming Languages','Web Technologies','Frameworks & Libraries','Databases',
  'DevOps & Cloud','Testing & QA','Specializations','Prototyping & Design',
  'Productivity & Office','Devices'
];
const TEST_SKILLS_BY_CAT = {
  'Programming Languages': ['JavaScript','Python','TypeScript','Java','C#','C++','Go','Rust','Swift','Kotlin','PHP','Ruby'],
  'Web Technologies':      ['HTML5','CSS3','REST APIs','GraphQL','WebSockets','AJAX','JSON','Webpack','Vite','SASS/SCSS'],
  'Frameworks & Libraries':['React','Vue.js','Angular','Next.js','Node.js','Express','Django','Spring Boot','Laravel','FastAPI','Svelte'],
  'Databases':             ['PostgreSQL','MySQL','MongoDB','Redis','SQLite','Elasticsearch','DynamoDB','Cassandra'],
  'DevOps & Cloud':        ['Docker','Kubernetes','AWS','Azure','GCP','CI/CD','Terraform','Linux','Nginx','Git'],
  'Testing & QA':          ['Jest','Cypress','Selenium','Pytest','JUnit','Mocha','Playwright','Postman'],
  'Specializations':       ['Machine Learning','Data Engineering','System Design','Security','Mobile Development','UX/UI Design','API Design','Microservices'],
  'Prototyping & Design':  ['Figma','Sketch','Adobe XD','InVision','Miro','Axure'],
  'Productivity & Office': ['Jira','Confluence','Notion','Slack','Microsoft Office','Google Workspace','Trello','Asana'],
  'Devices':               ['Desktop','Mobile','IoT','Embedded Systems','Raspberry Pi'],
};

function _randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function _seededRand(seed) {
  // simple deterministic pseudo-random from a seed string
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = (Math.imul(31, h) + seed.charCodeAt(i)) | 0;
  return () => { h = (Math.imul(h ^ (h >>> 16), 0x45d9f3b)) | 0; return ((h >>> 0) / 0xffffffff); };
}

function _buildTestUsers() {
  return TEST_FIRST_NAMES.map((fn, i) => {
    const ln    = TEST_LAST_NAMES[i];
    const email = `${fn.toLowerCase()}.t.${ln.toLowerCase()}@emphora.dev`;
    const rand  = _seededRand(email); // deterministic per user

    // Pick 5–15 random skills across categories
    const allSkills = [];
    TEST_CATEGORIES.forEach(cat => {
      (TEST_SKILLS_BY_CAT[cat] || []).forEach(skill => allSkills.push({ skill, cat }));
    });
    const skillCount  = 15 + Math.floor(rand() * 36); // 15–50
    const shuffled    = [...allSkills].sort(() => rand() - 0.5);
    const picked      = shuffled.slice(0, skillCount);
    const skills      = {};
    picked.forEach(({ skill, cat }) => {
      skills[skill] = { score: 1 + Math.floor(rand() * 10), category: cat };
    });

    const avgScore = Object.values(skills).reduce((a, b) => a + b.score, 0) / Object.keys(skills).length;
    const emphoraScore = Math.round((20 + rand() * 78) * 10) / 10; // 20–98

    return { firstName: fn, middleName: 'T', lastName: ln, email, skills, emphoraScore };
  });
}

const TEST_USERS = TESTING ? _buildTestUsers() : [];

async function seedTestUsers() {
  if (!TESTING || TEST_USERS.length === 0) return;
  let seeded = 0;
  for (const u of TEST_USERS) {
    try {
      const res  = await fetch(`${API}/api/auth/register`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ firstName: u.firstName + ' T', lastName: u.lastName,
          email: u.email, password: 'test-1234', accountType: 'employee' }),
        credentials: 'include',
      });
      const data = await res.json();
      // Whether newly created or already exists, seed localStorage skills
      if (data.ok || (data.message && data.message.includes('already exists'))) {
        localStorage.setItem(`emphora_skills_${u.email}`, JSON.stringify(u.skills));
        seeded++;
      }
    } catch(_) {}
  }
  console.info(`[Emphora Test] Seeded ${seeded} / ${TEST_USERS.length} test users`);
}

async function removeTestUsers() {
  if (TESTING) return; // only remove when TESTING=false
  for (const u of _buildTestUsers()) {
    try {
      // Remove localStorage skills
      localStorage.removeItem(`emphora_skills_${u.email}`);
      // Try to find and delete via admin API
      const listRes = await fetch(`${API}/api/admin/users`, { credentials: 'include' });
      const list    = await listRes.json();
      const found   = list.users?.find(x => x.email === u.email);
      if (found) await fetch(`${API}/api/admin/users/${found.id}`, { method: 'DELETE', credentials: 'include' });
    } catch(_) {}
  }
  console.info('[Emphora Test] Removed test users');
}

// ── State ─────────────────────────────────────────────────────────────────────
let allUsers = [];
let sortCol  = 'id';
let sortAsc  = false;
let editId   = null;
let theme    = localStorage.getItem('em-theme') || 'light';

// ── Theme ─────────────────────────────────────────────────────────────────────
function applyTheme(t) {
  theme = t;
  document.body.dataset.theme = t;
  document.querySelector('#theme-btn .material-icons-round').textContent =
    t === 'dark' ? 'dark_mode' : 'light_mode';
  localStorage.setItem('em-theme', t);
}
applyTheme(theme);
document.getElementById('theme-btn').onclick = () =>
  applyTheme(theme === 'dark' ? 'light' : 'dark');

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function load() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spin');
  btn.disabled = true;
  setWrap(`<div class="state"><div class="spinner"></div><span>Loading…</span></div>`);
  setDebug('');

  try {
    const url = `${API}/api/admin/users`;
    const res  = await fetch(url, { credentials: 'include' });
    const raw  = await res.text();

    // Always show raw response so you can debug
    setDebug(`GET ${url}\nHTTP ${res.status}\n\n${raw.slice(0, 600)}`);

    if (!res.ok) {
      setWrap(`<div class="state"><span class="material-icons-round">error_outline</span>
        <span>HTTP ${res.status} — see debug box below</span></div>`);
      return;
    }

    let data;
    try { data = JSON.parse(raw); }
    catch (e) {
      setWrap(`<div class="state"><span class="material-icons-round">error_outline</span>
        <span>Response is not JSON — see debug box below</span></div>`);
      return;
    }

    if (!data.ok) {
      setWrap(`<div class="state"><span class="material-icons-round">error_outline</span>
        <span>${esc(data.message || 'API returned ok:false')}</span></div>`);
      return;
    }

    allUsers = Array.isArray(data.users) ? data.users : [];
    const n  = allUsers.length;
    document.getElementById('total-badge').textContent = `${n} user${n !== 1 ? 's' : ''}`;
    document.getElementById('footer-time').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
    if (n > 0) setDebug('');  // clear debug on success
    render();

  } catch (err) {
    setWrap(`<div class="state"><span class="material-icons-round">wifi_off</span>
      <span>Network error — is the server running?<br/><small>${esc(err.message)}</small></span></div>`);
    setDebug(`fetch threw:\n${err.message}`);
  } finally {
    btn.classList.remove('spin');
    btn.disabled = false;
  }
}

function setWrap(html) { document.getElementById('table-wrap').innerHTML = html; }
function setDebug(txt) {
  document.getElementById('debug-wrap').innerHTML =
    txt ? `<div class="debug-box">${esc(txt)}</div>` : '';
}

// ── Filter / sort ─────────────────────────────────────────────────────────────
function getFiltered() {
  const q  = (document.getElementById('search').value || '').toLowerCase().trim();
  const tp = document.getElementById('filter-type').value;
  const st = document.getElementById('filter-status').value;
  const vr = document.getElementById('filter-verified').value;

  // Filter out seed pool if toggled
  const visible = hideSeedPool ? allUsers.filter(u => !SEED_POOL_EMAILS.has(u.email)) : allUsers;
  return visible.filter(u => {
    const nm = `${u.firstName||''} ${u.lastName||''} ${u.email||''}`.toLowerCase();
    if (q  && !nm.includes(q))         return false;
    if (tp && u.accountType !== tp)    return false;
    if (st === '1' && !u.isActive)     return false;
    if (st === '0' &&  u.isActive)     return false;
    if (vr === '1' && !u.isVerified)   return false;
    if (vr === '0' &&  u.isVerified)   return false;
    return true;
  });
}

function getSorted(arr) {
  return [...arr].sort((a, b) => {
    let va = a[sortCol] ?? '', vb = b[sortCol] ?? '';
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    return va < vb ? (sortAsc ? -1 : 1) : va > vb ? (sortAsc ? 1 : -1) : 0;
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
const ICONS  = { employee:'badge', employer:'business', researcher:'science' };
const LABELS = { employee:'Employee', employer:'Employer', researcher:'Researcher' };

function render() {
  const rows = getSorted(getFiltered());
  document.getElementById('footer-count').textContent =
    `Showing ${rows.length} of ${allUsers.length} users`;

  if (allUsers.length === 0) {
    setWrap(`<div class="state"><span class="material-icons-round">group_off</span>
      <span>No users — restart server to seed accounts</span></div>`);
    return;
  }
  if (rows.length === 0) {
    setWrap(`<div class="state"><span class="material-icons-round">search_off</span>
      <span>No users match your filters</span></div>`);
    return;
  }

  const cols = [
    {k:'id',l:'ID'},{k:'firstName',l:'Name'},{k:'email',l:'Email'},
    {k:'accountType',l:'Type'},{k:'isActive',l:'Status'},{k:'isVerified',l:'Verified'},
    {k:'activeSessions',l:'Sessions'},{k:'createdAt',l:'Joined'},{k:'_',l:''},
  ];

  const arr = k => sortCol !== k
    ? `<span class="material-icons-round si">unfold_more</span>`
    : `<span class="material-icons-round si">${sortAsc?'arrow_upward':'arrow_downward'}</span>`;

  const thead = cols.map(c => c.k === '_'
    ? `<th style="cursor:default"></th>`
    : `<th class="${sortCol===c.k?'sorted':''}" data-k="${c.k}">${esc(c.l)}${arr(c.k)}</th>`
  ).join('');

  const tbody = rows.map((u, i) => {
    const icon    = ICONS[u.accountType]  || 'person';
    const tlabel  = LABELS[u.accountType] || String(u.accountType);
    const active  = Boolean(u.isActive);
    const verified = Boolean(u.isVerified);
    const sess    = Number(u.activeSessions) || 0;

    return `<tr class="clickable-row${active?'':' dim'}" style="animation-delay:${i*.02}s;cursor:pointer"
      data-id="${u.id}" data-email="${esc(u.email)}" data-type="${esc(u.accountType)}"
      title="Click to login as ${esc(u.firstName)} ${esc(u.lastName)}">
      <td class="cell-id">#${u.id}</td>
      <td class="cell-name">${esc(u.firstName||'')} ${esc(u.lastName||'')}</td>
      <td class="cell-email">${esc(u.email||'')}</td>
      <td><span class="pill pill-${esc(u.accountType)}"><span class="material-icons-round">${icon}</span>${esc(tlabel)}</span></td>
      <td><span class="status ${active?'active-yes':'active-no'}"><span class="material-icons-round">${active?'check_circle':'block'}</span>${active?'Active':'Disabled'}</span></td>
      <td>${verified?'<span class="ver-yes">✓ Yes</span>':'<span class="ver-no">— No</span>'}</td>
      <td style="text-align:center"><span class="sess${sess===0?' sess-zero':''}">${sess}</span></td>
      <td class="cell-date">${fmtDate(u.createdAt)}</td>
      <td><div class="acts">
        <button class="act act-edit"    data-a="edit"    data-id="${u.id}" title="Edit"><span class="material-icons-round">edit</span></button>
        ${active
          ? `<button class="act act-disable" data-a="disable" data-id="${u.id}" title="Disable"><span class="material-icons-round">block</span></button>`
          : `<button class="act act-enable"  data-a="enable"  data-id="${u.id}" title="Enable"><span class="material-icons-round">check_circle</span></button>`}
        <button class="act act-delete"  data-a="delete"  data-id="${u.id}" title="Delete"><span class="material-icons-round">delete_outline</span></button>
      </div></td>
    </tr>`;
  }).join('');

  setWrap(`<table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`);

  document.querySelectorAll('th[data-k]').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.dataset.k;
      sortCol === k ? (sortAsc = !sortAsc) : (sortCol = k, sortAsc = true);
      render();
    });
  });

  // Clicking anywhere on a row logs in as that user
  document.querySelectorAll('tr.clickable-row').forEach(tr => {
    tr.addEventListener('click', (e) => {
      // Don't trigger if clicking an action button
      if (e.target.closest('.acts')) return;
      const {id, email, type} = tr.dataset;
      loginAs(Number(id), email, type);
    });
  });

  document.querySelectorAll('.act[data-a]').forEach(b => {
    b.addEventListener('click', () => {
      const {a, id, email, type} = b.dataset, uid = Number(id);
      if (a==='edit')    openModal(uid);
      if (a==='enable')  toggle(uid, true);
      if (a==='disable') toggle(uid, false);
      if (a==='delete')  del(uid);
    });
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(uid) {
  editId = uid ?? null;
  const isEdit = editId !== null;
  document.getElementById('modal-title').textContent = isEdit ? 'Edit user' : 'Add user';
  document.getElementById('save-label').textContent  = isEdit ? 'Save changes' : 'Create user';
  document.getElementById('f-pw-hint').textContent   = isEdit ? '(leave blank to keep)' : '(min 8 chars)';
  document.getElementById('f-pw').required           = !isEdit;
  document.getElementById('user-form').reset();
  document.getElementById('f-id').value = uid ?? '';
  document.getElementById('f-active').checked = true;

  if (isEdit) {
    const u = allUsers.find(x => x.id === uid);
    if (!u) return;
    document.getElementById('f-fname').value      = u.firstName   || '';
    document.getElementById('f-lname').value      = u.lastName    || '';
    document.getElementById('f-email').value      = u.email       || '';
    document.getElementById('f-type').value       = u.accountType || 'employee';
    document.getElementById('f-verified').checked = Boolean(u.isVerified);
    document.getElementById('f-active').checked   = Boolean(u.isActive);
  }

  const bg = document.getElementById('modal-bg');
  bg.classList.add('open');
  bg.setAttribute('aria-hidden','false');
  setTimeout(() => document.getElementById('f-fname').focus(), 60);
}

function closeModal() {
  const bg = document.getElementById('modal-bg');
  bg.classList.remove('open');
  bg.setAttribute('aria-hidden','true');
  document.getElementById('user-form').reset();
  editId = null;
}

document.getElementById('user-form').addEventListener('submit', async e => {
  e.preventDefault();
  const saveBtn = document.getElementById('save-btn');
  const isEdit  = editId !== null;
  const body    = {
    firstName:   document.getElementById('f-fname').value.trim(),
    lastName:    document.getElementById('f-lname').value.trim(),
    email:       document.getElementById('f-email').value.trim(),
    accountType: document.getElementById('f-type').value,
    isVerified:  document.getElementById('f-verified').checked,
    isActive:    document.getElementById('f-active').checked,
  };
  const pw = document.getElementById('f-pw').value;
  if (pw) body.password = pw;
  else if (!isEdit) { alert('Password is required.'); return; }

  saveBtn.disabled = true;
  document.getElementById('save-label').textContent = isEdit ? 'Saving…' : 'Creating…';

  try {
    const url = isEdit ? `${API}/api/admin/users/${editId}` : `${API}/api/auth/register`;
    const res  = await fetch(url, {
      method:  isEdit ? 'PATCH' : 'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify(body),
      credentials: 'include',
    });
    const data = await res.json();
    if (data.ok) { closeModal(); await load(); }
    else alert(data.message || 'Save failed.');
  } catch (err) { alert('Network error: ' + err.message); }
  finally {
    saveBtn.disabled = false;
    document.getElementById('save-label').textContent = 'Save user';
  }
});

async function toggle(uid, active) {
  try {
    const res  = await fetch(`${API}/api/admin/users/${uid}/${active?'activate':'deactivate'}`,
      {method:'PATCH', credentials:'include'});
    const data = await res.json();
    if (data.ok) load(); else alert(data.message);
  } catch (err) { alert('Network error: ' + err.message); }
}

async function del(uid) {
  const u = allUsers.find(x => x.id === uid);
  if (!confirm(`Delete ${u?.firstName} ${u?.lastName}?\nThis cannot be undone.`)) return;
  try {
    const res  = await fetch(`${API}/api/admin/users/${uid}`,
      {method:'DELETE', credentials:'include'});
    const data = await res.json();
    if (data.ok) load(); else alert(data.message);
  } catch (err) { alert('Network error: ' + err.message); }
}

async function loginAs(uid, email, accountType) {
  const password = SEED_PASSWORD; // users.html is admin-only — always use seed password

  const loginBtn = document.querySelector(`.act[data-a="login"][data-id="${uid}"]`);
  const iconEl   = loginBtn?.querySelector('.material-icons-round');
  if (loginBtn) { loginBtn.disabled = true; if (iconEl) iconEl.textContent = 'hourglass_empty'; }

  try {
    const res  = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password}),
      credentials: 'include',
    });
    const data = await res.json();

    if (data.ok && data.user) {
      const u = { ...data.user };
      if (u.email === 'admin@emphora.dev' || u.accountType === 'admin') u.accountType = 'admin';
      sessionStorage.setItem('emphora_user', JSON.stringify(u));
      seedLocalData(u);
      const pages = {employee:'employee.html', employer:'employer.html', researcher:'researcher.html', admin:'admin.html'};
      window.location.href = pages[u.accountType] || 'employee.html';
    } else {
      alert(`Login failed: ${data.message || 'Invalid credentials'}`);
      if (loginBtn) { loginBtn.disabled = false; if (iconEl) iconEl.textContent = 'login'; }
    }
  } catch (err) {
    alert('Network error: ' + err.message);
    if (loginBtn) { loginBtn.disabled = false; if (iconEl) iconEl.textContent = 'login'; }
  }
}

function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}); }
  catch { return String(iso); }
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let hideSeedPool = false;
document.getElementById('hide-seed-btn').addEventListener('click', () => {
  hideSeedPool = !hideSeedPool;
  const btn = document.getElementById('hide-seed-btn');
  const icon = btn.querySelector('.material-icons-round');
  if (hideSeedPool) {
    icon.textContent = 'visibility';
    btn.childNodes[btn.childNodes.length-1].textContent = 'Show Seed Pool';
    btn.style.background = 'rgba(26,107,204,.14)';
  } else {
    icon.textContent = 'visibility_off';
    btn.childNodes[btn.childNodes.length-1].textContent = 'Hide Seed Pool';
    btn.style.background = 'rgba(26,107,204,.06)';
  }
  render();
});

['search','filter-type','filter-status','filter-verified'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('input',  render);
  el.addEventListener('change', render);
});

// Show back button only if user is admin type
const _u = (() => { try { return JSON.parse(sessionStorage.getItem('emphora_user')||'null'); } catch { return null; } })();
const backBtn = document.getElementById('back-btn');
if (backBtn && _u?.accountType !== 'admin') {
  backBtn.style.display = 'none';
}

// Boot

// Logo always goes to user's own dashboard
(function() {
  const DASH = { employee:'employee.html', employer:'employer.html', researcher:'researcher.html', admin:'admin.html' };
  try {
    const u = JSON.parse(sessionStorage.getItem('emphora_user')||'null');
    const logoEl = document.querySelector('.logo, .em-logo');
    if (logoEl && u) logoEl.href = DASH[u.accountType] || 'employee.html';
  } catch(_) {}
})();
</script>
