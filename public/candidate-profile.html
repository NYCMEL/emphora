<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Emphora — Candidate Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<style>
  :root{--primary:#1A6BCC;--success:#2E7D32;--danger:#C62828;--bg:#F0F4F9;--surface:#FFFFFF;--surface2:#F0F4F9;--border:#D0DCE8;--text:#0D1B2A;--muted:#7A8FA6;}
  [data-theme="dark"]{--bg:#0A0F1A;--surface:#111827;--surface2:#1A2236;--border:rgba(255,255,255,.10);--text:#E8F1FF;--muted:#5C7389;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .topbar{position:sticky;top:0;z-index:100;height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.25rem;gap:8px;}
  .logo{font-family:'DM Serif Display',Georgia,serif;font-style:italic;font-size:1.3rem;color:var(--primary);text-decoration:none;flex-shrink:0;}
  .logo b{color:#00897B;font-weight:400;}
  .bc-sep{color:var(--border);margin:0 4px;font-size:.85rem;user-select:none;}
  .bc-link{font-size:.8rem;color:var(--muted);text-decoration:none;white-space:nowrap;}
  .bc-link:hover{color:var(--primary);}
  .bc-current{font-size:.8rem;font-weight:600;color:var(--text);white-space:nowrap;}
  .spacer{flex:1;}
  .icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;text-decoration:none;}
  .icon-btn:hover{color:var(--primary);border-color:var(--primary);}
  .icon-btn .material-icons-round{font-size:1rem;}
  .avatar{width:28px;height:28px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:#fff;flex-shrink:0;}
  .material-icons-round{font-family:'Material Icons Round';font-style:normal;}

  /* Page */
  .page{max-width:900px;margin:0 auto;padding:2rem 1.5rem;}

  /* Hero */
  .hero{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem;margin-bottom:1.25rem;display:flex;align-items:flex-start;gap:1.5rem;flex-wrap:wrap;}
  .hero-avatar{width:72px;height:72px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:1.6rem;color:#fff;flex-shrink:0;}
  .hero-info{flex:1;min-width:0;}
  .hero-name{font-family:'DM Serif Display',Georgia,serif;font-size:1.6rem;font-weight:400;letter-spacing:-.02em;}
  .hero-sub{font-size:.82rem;color:var(--muted);margin-top:3px;}
  .hero-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .hero-pill{display:inline-flex;align-items:center;gap:5px;font-size:.74rem;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text);}
  .hero-pill.accent{background:rgba(26,107,204,.1);border-color:rgba(26,107,204,.25);color:var(--primary);}
  .hero-pill.green{background:rgba(46,125,50,.1);border-color:rgba(46,125,50,.25);color:#2E7D32;}
  .hero-pill.amber{background:rgba(230,81,0,.1);border-color:rgba(230,81,0,.25);color:#E65100;}
  .hero-actions{display:flex;flex-direction:column;gap:8px;flex-shrink:0;}

  /* Buttons */
  .btn-primary{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:10px;background:var(--primary);border:none;color:#fff;font:700 .84rem inherit;cursor:pointer;transition:filter .15s;text-decoration:none;}
  .btn-primary:hover{filter:brightness(1.1);}
  .btn-outline{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:10px;background:transparent;border:1px solid var(--border);color:var(--text);font:600 .84rem inherit;cursor:pointer;transition:all .15s;text-decoration:none;}
  .btn-outline:hover{border-color:var(--primary);color:var(--primary);}
  .btn-danger{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:10px;background:transparent;border:1px solid rgba(198,40,40,.3);color:#C62828;font:600 .84rem inherit;cursor:pointer;transition:all .15s;}
  .btn-danger:hover{background:rgba(198,40,40,.08);}

  /* Score ring */
  .score-ring{display:flex;flex-direction:column;align-items:center;justify-content:center;width:90px;height:90px;border-radius:50%;border:4px solid var(--primary);flex-shrink:0;}
  .score-val{font-family:'DM Serif Display',serif;font-size:1.5rem;font-weight:400;color:var(--primary);line-height:1;}
  .score-lbl{font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:2px;}

  /* Sections */
  .section{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:1rem;overflow:hidden;}
  .section-header{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.1rem;border-bottom:1px solid var(--border);}
  .section-title{font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:7px;}
  .section-title .material-icons-round{font-size:.9rem;}
  .section-body{padding:1rem 1.1rem;}

  /* Skills grid */
  .skills-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .skill-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.74rem;font-weight:600;border:1.5px solid;}
  .skill-score{font-size:.68rem;opacity:.8;}

  /* Work history */
  .work-item{display:flex;align-items:flex-start;gap:12px;padding:.75rem 0;border-bottom:1px solid var(--border);}
  .work-item:last-child{border-bottom:none;}
  .work-logo{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#1A6BCC,#00897B);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;flex-shrink:0;}
  .work-info{flex:1;}
  .work-company{font-size:.88rem;font-weight:700;}
  .work-role{font-size:.76rem;color:var(--muted);}
  .work-dates{font-size:.68rem;color:var(--muted);margin-top:2px;}

  /* Status badge */
  .status-select{border:1px solid var(--border);border-radius:8px;padding:7px 12px;background:var(--surface2);color:var(--text);font:600 .82rem inherit;outline:none;cursor:pointer;}
  .status-select:focus{border-color:var(--primary);}

  /* Notes */
  .notes-area{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;background:var(--surface2);color:var(--text);font:inherit;font-size:.84rem;resize:vertical;min-height:80px;outline:none;}
  .notes-area:focus{border-color:var(--primary);}
  .save-note-btn{margin-top:8px;display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;background:var(--primary);border:none;color:#fff;font:600 .78rem inherit;cursor:pointer;}
  .save-note-btn:hover{filter:brightness(1.1);}
  .saved-tag{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;color:#2E7D32;margin-left:8px;opacity:0;transition:opacity .3s;}
  .saved-tag.show{opacity:1;}
</style>
</head>
<body>
<nav class="topbar">
  <a href="employer.html" class="logo" id="nav-logo">Emph<b>ora</b></a>
  <span class="bc-sep">›</span>
  <a href="employer.html" class="bc-link">Employer Dashboard</a>
  <span class="bc-sep">›</span>
  <span class="bc-current" id="bc-name">Candidate Profile</span>
  <div class="spacer"></div>
  <a href="employer.html" title="Edit profile" style="display:flex;align-items:center;gap:8px;text-decoration:none;padding:3px 3px 3px 10px;border-radius:30px;transition:background .15s" onmouseover="this.style.background='rgba(0,0,0,.04)'" onmouseout="this.style.background='transparent'">
    <div style="display:flex;flex-direction:column;gap:0;text-align:right">
      <span id="topbar-name" style="font-size:.82rem;font-weight:700;color:var(--text);line-height:1.25"></span>
      <span id="topbar-email" style="font-size:.68rem;color:var(--muted);line-height:1.25"></span>
    </div>
    <div id="topbar-initials" class="avatar" style="opacity:0"></div>
  </a>
  <button class="icon-btn" id="theme-btn" title="Toggle theme"><span class="material-icons-round">light_mode</span></button>
  <a href="employer.html" class="icon-btn" title="Back to Dashboard"><span class="material-icons-round">arrow_back</span></a>
</nav>

<div class="page">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-avatar" id="hero-avatar">?</div>
    <div class="hero-info">
      <div class="hero-name" id="hero-name">Loading…</div>
      <div class="hero-sub" id="hero-role">—</div>
      <div class="hero-pills" id="hero-pills"></div>
    </div>
    <div class="score-ring" id="score-ring">
      <div class="score-val" id="score-val">—</div>
      <div class="score-lbl">Score</div>
    </div>
    <div class="hero-actions">
      <button class="btn-primary" id="btn-schedule"><span class="material-icons-round">event</span>Schedule Interview</button>
      <button class="btn-outline" id="btn-message"><span class="material-icons-round">mail_outline</span>Send Message</button>
      <button class="btn-danger" id="btn-reject"><span class="material-icons-round">cancel</span>Not a Fit</button>
    </div>
  </div>

  <!-- Status -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><span class="material-icons-round">flag</span>Application Status</div>
    </div>
    <div class="section-body" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <div>
        <div style="font-size:.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px">Current Status</div>
        <select class="status-select" id="status-select">
          <option value="New">New</option>
          <option value="Screening">Screening</option>
          <option value="Resume Received">Resume Received</option>
          <option value="Pending Review">Pending Review</option>
          <option value="Interview Set">Interview Set</option>
          <option value="Offer Extended">Offer Extended</option>
          <option value="Hired">Hired</option>
          <option value="Not a Fit">Not a Fit</option>
        </select>
      </div>
      <div>
        <div style="font-size:.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px">Applied For</div>
        <div id="applied-role" style="font-size:.88rem;font-weight:600"></div>
      </div>
      <div>
        <div style="font-size:.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:5px">Match Score</div>
        <div id="match-score" style="font-size:.88rem;font-weight:700;color:var(--primary)"></div>
      </div>
    </div>
  </div>

  <!-- Skills -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><span class="material-icons-round">psychology</span>Skills</div>
    </div>
    <div class="section-body">
      <div class="skills-grid" id="skills-grid"></div>
    </div>
  </div>

  <!-- Work History -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><span class="material-icons-round">business_center</span>Work History</div>
    </div>
    <div class="section-body" id="work-history"></div>
  </div>

  <!-- Recruiter Notes -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><span class="material-icons-round">edit_note</span>Recruiter Notes</div>
    </div>
    <div class="section-body">
      <textarea class="notes-area" id="recruiter-notes" placeholder="Add private notes about this candidate…"></textarea>
      <div style="display:flex;align-items:center">
        <button class="save-note-btn" id="save-notes-btn"><span class="material-icons-round">save</span>Save Notes</button>
        <span class="saved-tag" id="saved-tag"><span class="material-icons-round">check_circle</span>Saved</span>
      </div>
    </div>
  </div>

</div>

<script>
'use strict';
const user=(()=>{try{return JSON.parse(sessionStorage.getItem('emphora_user')||'null');}catch{return null;}})();
if(!user) window.location.href='/';

// ── User identity ──────────────────────────────────────────────────────────────
(function(){
  const fn=user.firstName||'', ln=user.lastName||'';
  const ini=((fn[0]||'')+(ln[0]||'')).toUpperCase()||'';
  const ne=document.getElementById('topbar-name');
  const ee=document.getElementById('topbar-email');
  const ae=document.getElementById('topbar-initials');
  if(ne) ne.textContent=(fn+' '+ln).trim();
  if(ee) ee.textContent=user.email||'';
  if(ae){ae.textContent=ini;ae.style.opacity='1';}
  try{const img=localStorage.getItem('emphora_avatar_'+user.email);if(img&&ae){ae.style.backgroundImage=`url(${img})`;ae.style.backgroundSize='cover';ae.style.backgroundPosition='center';ae.style.color='transparent';}}catch(_){}
})();

let theme=localStorage.getItem('em-theme')||'light';
function applyTheme(t){theme=t;document.body.dataset.theme=t;document.querySelector('#theme-btn .material-icons-round').textContent=t==='dark'?'dark_mode':'light_mode';localStorage.setItem('em-theme',t);}
applyTheme(theme);
document.getElementById('theme-btn').onclick=()=>applyTheme(theme==='dark'?'light':'dark');

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');}
function scoreColor(s){if(s<=3)return '#EF5350';if(s<=5)return '#FFA726';if(s<=7)return '#9CCC65';return '#1A6BCC';}

// ── Parse URL params ───────────────────────────────────────────────────────────
const params  = new URLSearchParams(location.search);
const candName   = params.get('name')   || 'Candidate';
const candScore  = parseFloat(params.get('score') || '0');
const candMatch  = params.get('match')  || '—';
const candRole   = params.get('role')   || '—';
const candStatus = params.get('status') || 'New';
const candId     = encodeURIComponent(candName + '_' + candRole);

// ── Persistent state key ───────────────────────────────────────────────────────
const STATE_KEY = 'emphora_candidate_' + user.email + '_' + candId;
let state = { status: candStatus, notes: '' };
try { Object.assign(state, JSON.parse(localStorage.getItem(STATE_KEY)||'{}')); } catch(_) {}

// ── Populate hero ──────────────────────────────────────────────────────────────
const ini = candName.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
document.getElementById('bc-name').textContent = candName;
document.getElementById('hero-name').textContent = candName;
document.getElementById('hero-role').textContent = 'Applying for: ' + candRole;
document.getElementById('hero-avatar').textContent = ini;
document.getElementById('score-val').textContent = candScore.toFixed(1);
document.getElementById('applied-role').textContent = candRole;
document.getElementById('match-score').textContent = candMatch + '% match';

// Score ring color
const sc = scoreColor(candScore / 10);
document.getElementById('score-ring').style.borderColor = sc;
document.getElementById('score-val').style.color = sc;

// Hero pills
const pills = [];
if(candMatch) pills.push(`<span class="hero-pill accent"><span class="material-icons-round" style="font-size:.75rem">percent</span>${candMatch}% Match</span>`);
pills.push(`<span class="hero-pill green"><span class="material-icons-round" style="font-size:.75rem">verified</span>Verified</span>`);
pills.push(`<span class="hero-pill"><span class="material-icons-round" style="font-size:.75rem">stars</span>${candScore.toFixed(1)} Emphora Score</span>`);
document.getElementById('hero-pills').innerHTML = pills.join('');

// ── Status select ──────────────────────────────────────────────────────────────
const statusSel = document.getElementById('status-select');
[...statusSel.options].forEach(o => o.selected = o.value === state.status);
statusSel.addEventListener('change', () => {
  state.status = statusSel.value;
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(_) {}
});

// ── Generate skills from candidate data (seeded by name) ──────────────────────
(function renderSkills(){
  let rng = candName.split('').reduce((a,c)=>a+c.charCodeAt(0),0)*17;
  function rand(max){rng=(rng*1664525+1013904223)&0xffffffff;return Math.abs(rng)%max;}
  const POOLS = [
    {cat:'Web Technologies',     skills:['HTML5','CSS3','JavaScript','TypeScript','REST APIs','GraphQL']},
    {cat:'Frameworks',           skills:['React','Vue.js','Angular','Node.js','Express','Django']},
    {cat:'Design',               skills:['Figma','UX/UI Design','Interaction Design','Responsive Design','Prototyping']},
    {cat:'DevOps',               skills:['Docker','AWS','CI/CD','Git','Linux']},
    {cat:'Databases',            skills:['PostgreSQL','MongoDB','Redis','MySQL']},
    {cat:'Specializations',      skills:['Agile','System Design','API Design','Accessibility (WCAG)','Design Systems']},
  ];
  const numCats = 3 + rand(3);
  const selected = POOLS.slice(0, numCats);
  const grid = document.getElementById('skills-grid');
  let html = '';
  selected.forEach(pool => {
    const count = 2 + rand(3);
    const picked = new Set();
    for(let i=0;i<count&&picked.size<pool.skills.length;i++){
      let idx=rand(pool.skills.length);
      while(picked.has(idx))idx=(idx+1)%pool.skills.length;
      picked.add(idx);
      const score = 5 + rand(5) + (candScore > 85 ? 2 : 0);
      const capped = Math.min(10, score);
      const col = scoreColor(capped);
      html += `<span class="skill-chip" style="color:${col};background:${col}12;border-color:${col}44">${esc(pool.skills[idx])} <span class="skill-score">${capped}</span></span>`;
    }
  });
  grid.innerHTML = html;
})();

// ── Generate work history (seeded by name) ─────────────────────────────────────
(function renderWork(){
  let rng = candName.split('').reduce((a,c)=>a+c.charCodeAt(0),0)*31+999;
  function rand(max){rng=(rng*1664525+1013904223)&0xffffffff;return Math.abs(rng)%max;}
  const COMPANIES = ['JPMorgan Chase','Goldman Sachs','Fidelity Investments','Stripe','Google','Salesforce','Morgan Stanley','Barclays','Accenture','IBM','Oracle','Adobe'];
  const TITLES    = ['Senior Engineer','UX Designer','Frontend Developer','Product Manager','Tech Lead','Full-Stack Engineer','Staff Engineer','UI/UX Lead'];
  const esc2 = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fmt = (y,m) => new Date(y,m-1).toLocaleDateString(undefined,{year:'numeric',month:'short'});
  const used = new Set();
  let html = '';
  const count = 2 + rand(2);
  let endY = 2025, endM = 1;
  for(let i=0;i<count;i++){
    let co; do{co=COMPANIES[rand(COMPANIES.length)];}while(used.has(co));
    used.add(co);
    const title = TITLES[rand(TITLES.length)];
    const durY = 1+rand(3), durM = rand(12);
    const fromY = endY - durY, fromM = endM - durM < 1 ? 12 : endM - durM;
    const ini2 = co.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const isCurrent = i === 0;
    html += `<div class="work-item">
      <div class="work-logo">${esc2(ini2)}</div>
      <div class="work-info">
        <div class="work-company">${esc2(co)}</div>
        <div class="work-role">${esc2(title)}</div>
        <div class="work-dates">${fmt(fromY, Math.max(1,fromM))} – ${isCurrent ? 'Present' : fmt(endY, endM)}</div>
      </div>
      ${isCurrent ? '<span style="font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(26,107,204,.1);color:var(--primary)">Current</span>' : ''}
    </div>`;
    endY = fromY; endM = Math.max(1, fromM);
  }
  document.getElementById('work-history').innerHTML = html;
})();

// ── Recruiter notes ────────────────────────────────────────────────────────────
const notesEl = document.getElementById('recruiter-notes');
notesEl.value = state.notes || '';
document.getElementById('save-notes-btn').addEventListener('click', () => {
  state.notes = notesEl.value;
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(_) {}
  const tag = document.getElementById('saved-tag');
  tag.classList.add('show');
  setTimeout(() => tag.classList.remove('show'), 2000);
});

// ── Action buttons ─────────────────────────────────────────────────────────────
document.getElementById('btn-schedule').addEventListener('click', () => {
  statusSel.value = 'Interview Set';
  state.status = 'Interview Set';
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(_) {}
  alert(`Interview scheduled with ${candName}. Status updated to "Interview Set".`);
});
document.getElementById('btn-reject').addEventListener('click', () => {
  if(!confirm(`Mark ${candName} as "Not a Fit"?`)) return;
  statusSel.value = 'Not a Fit';
  state.status = 'Not a Fit';
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(_) {}
  window.location.href = 'employer.html';
});
document.getElementById('btn-message').addEventListener('click', () => {
  alert('Messaging feature coming soon.');
});
</script>
</body>
</html>
