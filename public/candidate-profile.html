<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Emphora — Candidate Profile</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --primary:#1A6BCC; --bg:#F0F4F8; --surface:#fff; --surface2:#F8FAFC; --border:#D0DCE8; --text:#0D1B2A; --muted:#7A8FA6; --success:#2E7D32; --danger:#C62828; }
    [data-theme="dark"] { --bg:#0A0F1A; --surface:#111827; --surface2:#1A2236; --border:rgba(255,255,255,.10); --text:#E8F1FF; --muted:#5C7389; }
    body { font-family:'Plus Jakarta Sans',system-ui,sans-serif; font-size:14px; background:var(--bg); color:var(--text); min-height:100vh; }
    .topbar { position:sticky; top:0; z-index:100; height:54px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 1.25rem; gap:0; }
    .logo { font-family:'DM Serif Display',Georgia,serif; font-style:italic; font-size:1.3rem; color:var(--primary); text-decoration:none; flex-shrink:0; }
    .logo b { color:#00897B; font-weight:400; }
    .bc-sep { color:var(--border); margin:0 8px; font-size:.85rem; user-select:none; }
    .bc-link { font-size:.8rem; color:var(--muted); text-decoration:none; }
    .bc-link:hover { color:var(--primary); }
    .bc-current { font-size:.8rem; color:var(--text); font-weight:600; white-space:nowrap; }
    .spacer { flex:1; }
    .icon-btn { width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; text-decoration:none; flex-shrink:0; }
    .icon-btn:hover { color:var(--primary); border-color:var(--primary); }
    .icon-btn .material-icons-round { font-size:1rem; }
    .employer-action-bar { background:var(--surface); border-bottom:2px solid rgba(26,107,204,.2); padding:.85rem 2rem; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .action-lbl { font-size:.6rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:3px; }
    .status-select { border:1px solid var(--border); border-radius:8px; padding:6px 12px; background:var(--surface2); color:var(--text); font:600 .82rem inherit; outline:none; cursor:pointer; }
    .status-select:focus { border-color:var(--primary); }
    .badge { display:inline-flex; align-items:center; gap:5px; padding:6px 14px; border-radius:20px; font-size:.78rem; font-weight:700; }
    .badge-blue { background:rgba(26,107,204,.1); border:1px solid rgba(26,107,204,.25); color:var(--primary); }
    .btn-act { display:inline-flex; align-items:center; gap:5px; padding:7px 16px; border-radius:9px; font:600 .82rem inherit; cursor:pointer; transition:all .15s; border:1px solid var(--border); background:transparent; color:var(--text); }
    .btn-act:hover { border-color:var(--primary); color:var(--primary); }
    .btn-act.primary { background:var(--primary); border-color:var(--primary); color:#fff; }
    .btn-act.primary:hover { filter:brightness(1.1); }
    .btn-act.danger { border-color:rgba(198,40,40,.3); color:#C62828; }
    .btn-act.danger:hover { background:rgba(198,40,40,.08); }
    .btn-act .material-icons-round { font-size:.9rem; }
    .note-input { border:1px solid var(--border); border-radius:8px; padding:6px 12px; background:var(--surface2); color:var(--text); font:inherit; font-size:.8rem; width:200px; outline:none; }
    .note-input:focus { border-color:var(--primary); }
    .saved-tag { font-size:.72rem; color:var(--success); display:flex; align-items:center; gap:3px; opacity:0; transition:opacity .3s; }
    .saved-tag.show { opacity:1; }
    .profile-hero-strip { background:var(--surface); border-bottom:1px solid var(--border); padding:2rem 2rem 1.5rem; display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap; }
    .profile-avatar { width:90px; height:90px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; font-family:'DM Serif Display',serif; font-size:2rem; color:#fff; border:3px solid var(--border); box-shadow:0 4px 18px rgba(0,0,0,.1); flex-shrink:0; }
    .profile-hero-info { flex:1; min-width:0; }
    .profile-hero-name { font-family:'DM Serif Display',Georgia,serif; font-size:1.7rem; font-weight:400; }
    .profile-hero-sub { font-size:.85rem; color:var(--muted); margin-top:4px; }
    .profile-hero-pills { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .profile-hero-pill { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:.68rem; font-weight:700; background:rgba(26,107,204,.1); color:var(--primary); border:1px solid rgba(26,107,204,.2); }
    .profile-hero-pill .material-icons-round { font-size:.78rem; }
    .profile-page { max-width:100%; padding:2rem 2.5rem 2rem; }
    .profile-page-title { font-family:'DM Serif Display',Georgia,serif; font-size:1.2rem; font-weight:400; color:var(--text); margin-bottom:1.5rem; }
    .profile-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem 2rem; }
    @media(max-width:560px){.profile-grid{grid-template-columns:1fr;}}
    .profile-field { display:flex; flex-direction:column; gap:5px; }
    .profile-field.full { grid-column:1/-1; }
    .profile-label { font-size:.63rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); }
    .profile-value { font-size:.95rem; color:var(--text); font-weight:500; min-height:1.6em; }
    .profile-value.empty { color:var(--muted); font-style:italic; font-weight:400; }
    .profile-value a { color:var(--primary); }
    .profile-divider { grid-column:1/-1; border:none; border-top:1px solid var(--border); margin:.25rem 0; }
    .section { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin:0 2.5rem 1rem; overflow:hidden; }
    .section-header { display:flex; align-items:center; padding:.85rem 1.1rem; border-bottom:1px solid var(--border); }
    .section-title { font-size:.68rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); display:flex; align-items:center; gap:7px; }
    .section-title .material-icons-round { font-size:.9rem; }
    .section-body { padding:1rem 1.1rem; }
    .skills-grid { display:flex; flex-wrap:wrap; gap:6px; }
    .skill-chip { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:.74rem; font-weight:600; border:1.5px solid; }
    .work-item { display:flex; align-items:flex-start; gap:12px; padding:.75rem 0; border-bottom:1px solid var(--border); }
    .work-item:last-child { border-bottom:none; }
    .work-logo { width:36px; height:36px; border-radius:8px; background:linear-gradient(135deg,#1A6BCC,#00897B); display:flex; align-items:center; justify-content:center; font-size:.7rem; font-weight:700; color:#fff; flex-shrink:0; }
    .work-info { flex:1; }
    .work-company { font-size:.88rem; font-weight:700; }
    .work-role { font-size:.76rem; color:var(--muted); }
    .work-dates { font-size:.68rem; color:var(--muted); margin-top:2px; }
    .material-icons-round { font-family:'Material Icons Round'; font-style:normal; }
  </style>
</head>
<body>

<nav class="topbar">
  <a href="employer.html" class="logo">Emph<b>ora</b></a>
  <span class="bc-sep">›</span>
  <a href="employer.html" class="bc-link">Employer Dashboard</a>
  <span class="bc-sep">›</span>
  <span class="bc-current" id="bc-name">Candidate</span>
  <div class="spacer"></div>
  <a href="employer.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;padding:3px 3px 3px 10px;border-radius:30px;transition:background .15s" onmouseover="this.style.background='rgba(0,0,0,.04)'" onmouseout="this.style.background='transparent'">
    <div style="display:flex;flex-direction:column;gap:0;text-align:right">
      <span id="topbar-name" style="font-size:.82rem;font-weight:700;color:var(--text);line-height:1.25"></span>
      <span id="topbar-email" style="font-size:.68rem;color:var(--muted);line-height:1.25"></span>
    </div>
    <div id="topbar-initials" style="opacity:0;width:28px;height:28px;border-radius:50%;background:#1A6BCC;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:#fff;flex-shrink:0"></div>
  </a>
  <button class="icon-btn" id="theme-btn" title="Toggle theme"><span class="material-icons-round">light_mode</span></button>
  <a href="employer.html" class="icon-btn" title="Back"><span class="material-icons-round">arrow_back</span></a>
</nav>

<div class="employer-action-bar">
  <div>
    <span class="action-lbl">Status</span>
    <select class="status-select" id="status-select">
      <option>New</option><option>Screening</option><option>Resume Received</option>
      <option>Pending Review</option><option>Interview Set</option>
      <option>Offer Extended</option><option>Hired</option><option>Not a Fit</option>
    </select>
  </div>
  <div>
    <span class="action-lbl">Applied For</span>
    <strong id="role-val" style="font-size:.84rem">—</strong>
  </div>
  <div class="badge badge-blue"><span class="material-icons-round" style="font-size:.85rem">percent</span><span id="match-val">—</span> match</div>
  <button class="btn-act primary" id="btn-schedule"><span class="material-icons-round">event</span>Schedule Interview</button>
  <button class="btn-act" id="btn-message"><span class="material-icons-round">mail_outline</span>Message</button>
  <button class="btn-act danger" id="btn-reject"><span class="material-icons-round">cancel</span>Not a Fit</button>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <input class="note-input" id="note-input" placeholder="Private note…"/>
    <button class="btn-act primary" id="save-note-btn"><span class="material-icons-round">save</span></button>
    <span class="saved-tag" id="saved-tag"><span class="material-icons-round">check_circle</span>Saved</span>
  </div>
</div>

<div class="profile-hero-strip">
  <div class="profile-avatar" id="hero-avatar">?</div>
  <div class="profile-hero-info">
    <div class="profile-hero-name" id="hero-name">—</div>
    <div class="profile-hero-sub" id="hero-sub">—</div>
    <div class="profile-hero-pills" id="hero-pills"></div>
  </div>
</div>

<div class="profile-page">
  <div class="profile-page-title">Personal Information</div>
  <div class="profile-grid" id="profile-fields"></div>
</div>

<div class="section">
  <div class="section-header"><div class="section-title"><span class="material-icons-round">psychology</span>Skills</div></div>
  <div class="section-body"><div class="skills-grid" id="skills-grid"></div></div>
</div>

<div class="section" style="margin-bottom:3rem;margin-left:2.5rem;margin-right:2.5rem">
  <div class="section-header"><div class="section-title"><span class="material-icons-round">business_center</span>Work History</div></div>
  <div class="section-body" id="work-history"></div>
</div>

<script>
'use strict';
const user=(()=>{try{return JSON.parse(sessionStorage.getItem('emphora_user')||'null');}catch{return null;}})();
if(!user) window.location.href='/';

(function(){
  const fn=user.firstName||'',ln=user.lastName||'';
  const ini=((fn[0]||'')+(ln[0]||'')).toUpperCase()||'';
  const ne=document.getElementById('topbar-name'),ee=document.getElementById('topbar-email'),ae=document.getElementById('topbar-initials');
  if(ne)ne.textContent=(fn+' '+ln).trim();
  if(ee)ee.textContent=user.email||'';
  if(ae){ae.textContent=ini;ae.style.opacity='1';}
  try{const img=localStorage.getItem('emphora_avatar_'+user.email);if(img&&ae){ae.style.backgroundImage='url('+img+')';ae.style.backgroundSize='cover';ae.style.backgroundPosition='center';ae.style.color='transparent';}}catch(_){}
})();

let theme=localStorage.getItem('em-theme')||'light';
function applyTheme(t){theme=t;document.body.dataset.theme=t;document.querySelector('#theme-btn .material-icons-round').textContent=t==='dark'?'dark_mode':'light_mode';localStorage.setItem('em-theme',t);}
applyTheme(theme);
document.getElementById('theme-btn').onclick=()=>applyTheme(theme==='dark'?'light':'dark');
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function scoreColor(s){if(s<=3)return '#EF5350';if(s<=5)return '#FFA726';if(s<=7)return '#9CCC65';return '#1A6BCC';}

const params=new URLSearchParams(window.location.search);
const candName=params.get('name')||'Candidate';
const candScore=parseFloat(params.get('score')||'0');
const candMatch=params.get('match')||'--';
const candRole=params.get('role')||'--';
const initStatus=params.get('status')||'New';
const STATE_KEY='emphora_candidate_'+user.email+'_'+encodeURIComponent(candName+'_'+candRole);
let state={status:initStatus,note:''};
try{Object.assign(state,JSON.parse(localStorage.getItem(STATE_KEY)||'{}'));}catch(_){}
function saveState(){try{localStorage.setItem(STATE_KEY,JSON.stringify(state));}catch(_){}}

document.getElementById('bc-name').textContent=candName;
document.title='Emphora -- '+candName;
document.getElementById('match-val').textContent=candMatch+'%';
document.getElementById('role-val').textContent=candRole;

const statusSel=document.getElementById('status-select');
[...statusSel.options].forEach(o=>o.selected=o.value===state.status);
statusSel.addEventListener('change',()=>{state.status=statusSel.value;saveState();});

document.getElementById('note-input').value=state.note||'';
document.getElementById('save-note-btn').addEventListener('click',()=>{
  state.note=document.getElementById('note-input').value;saveState();
  const tag=document.getElementById('saved-tag');tag.classList.add('show');setTimeout(()=>tag.classList.remove('show'),2000);
});
document.getElementById('btn-schedule').addEventListener('click',()=>{
  statusSel.value='Interview Set';state.status='Interview Set';saveState();
  document.getElementById('btn-schedule').innerHTML='<span class="material-icons-round">check</span>Scheduled';
});
document.getElementById('btn-reject').addEventListener('click',()=>{
  if(!confirm('Mark '+candName+' as "Not a Fit"?'))return;
  statusSel.value='Not a Fit';state.status='Not a Fit';saveState();
  window.location.href='employer.html';
});
document.getElementById('btn-message').addEventListener('click',()=>alert('Messaging coming soon.'));

// Deterministic RNG seeded by candidate name
let rng=candName.split('').reduce((a,c)=>a+c.charCodeAt(0),0)*31;
function rand(max){rng=(rng*1664525+1013904223)&0xffffffff;return Math.abs(rng)%max;}

const firstName=candName.split(' ')[0]||candName;
const lastName=candName.split(' ').slice(1).join(' ')||'';
const ini=((firstName[0]||'')+(lastName[0]||'')).toUpperCase()||'?';
const LOCATIONS=['New York, NY','San Francisco, CA','Austin, TX','Seattle, WA','Boston, MA','Chicago, IL','Remote'];
const TITLES=['Lead UX Designer','Senior UX Engineer','Staff Engineer','Principal Engineer','Frontend Engineer','Product Designer','Design Systems Lead','Full-Stack Developer'];
const SUMMARIES=['Passionate technologist with a track record of delivering scalable systems and mentoring high-performing teams.','Results-driven designer focused on building intuitive, user-centric products that solve real-world problems.','Collaborative problem-solver with deep expertise in UX and front-end systems, passionate about accessibility.','Strategic technical leader bridging the gap between business goals and engineering execution.'];
const candLocation=LOCATIONS[rand(LOCATIONS.length)];
const title=TITLES[rand(TITLES.length)];
const summary=SUMMARIES[rand(SUMMARIES.length)];
const candLinkedin='https://linkedin.com/in/'+firstName.toLowerCase()+'-'+lastName.toLowerCase().replace(/\s+/g,'-');
const phone=['(415)','(212)','(512)','(617)','(206)'][rand(5)]+' 555-'+String(1000+rand(9000)).slice(0,4);

document.getElementById('hero-avatar').textContent=ini;
document.getElementById('hero-name').textContent=candName;
document.getElementById('hero-sub').textContent=title;
const pills=[];
if(candLocation)pills.push('<span class="profile-hero-pill"><span class="material-icons-round">location_on</span>'+esc(candLocation)+'</span>');
if(candScore>0)pills.push('<span class="profile-hero-pill"><span class="material-icons-round">stars</span>'+candScore.toFixed(1)+' Score</span>');
pills.push('<span class="profile-hero-pill" style="background:rgba(46,125,50,.1);color:#2E7D32;border-color:rgba(46,125,50,.2)"><span class="material-icons-round">verified</span>Verified</span>');
document.getElementById('hero-pills').innerHTML=pills.join('');

const FIELDS=[
  {label:'First Name',val:firstName},{label:'Last Name',val:lastName},
  {label:'Email Address',val:firstName.toLowerCase()+'.'+lastName.toLowerCase().replace(/\s+/g,'.')+'@emphora.dev'},
  {label:'Phone',val:phone},{label:'Location',val:candLocation},
  {label:'LinkedIn URL',val:candLinkedin,isUrl:true},{label:'Website',val:''},
  {label:'Job Title',val:title},{divider:true},
  {label:'Professional Summary',val:summary,full:true},
];
document.getElementById('profile-fields').innerHTML=FIELDS.map(f=>{
  if(f.divider)return '<hr class="profile-divider"/>';
  const val=f.val||'';
  return '<div class="profile-field'+(f.full?' full':'')+'"><div class="profile-label">'+f.label+'</div><div class="profile-value'+(val?'':' empty')+'">'+(f.isUrl&&val?'<a href="'+esc(val)+'" target="_blank">'+esc(val)+'</a>':esc(val)||'Not set')+'</div></div>';
}).join('');

(function(){
  const POOLS=[
    {cat:'Web Technologies',skills:['HTML5','CSS3','JavaScript','TypeScript','REST APIs','GraphQL']},
    {cat:'Frameworks',skills:['React','Vue.js','Angular','Node.js','Express','Next.js']},
    {cat:'Design',skills:['Figma','UX/UI Design','Interaction Design','Responsive Design','Prototyping','Sketch']},
    {cat:'DevOps',skills:['Docker','AWS','CI/CD','Git','Linux']},
    {cat:'Databases',skills:['PostgreSQL','MongoDB','Redis','MySQL']},
    {cat:'Specializations',skills:['Agile','Accessibility (WCAG)','Design Systems','Component Libraries','User Research']},
  ];
  let html='';
  POOLS.slice(0,3+rand(3)).forEach(pool=>{
    const count=2+rand(3);const picked=new Set();
    for(let i=0;i<count&&picked.size<pool.skills.length;i++){
      let idx=rand(pool.skills.length);while(picked.has(idx))idx=(idx+1)%pool.skills.length;picked.add(idx);
      const score=Math.min(10,5+rand(5)+(candScore>85?2:0));const col=scoreColor(score);
      html+='<span class="skill-chip" style="color:'+col+';background:'+col+'12;border-color:'+col+'44">'+esc(pool.skills[idx])+' <span style="font-size:.68rem;opacity:.8">'+score+'</span></span>';
    }
  });
  document.getElementById('skills-grid').innerHTML=html;
})();

(function(){
  let rng2=candName.split('').reduce((a,c)=>a+c.charCodeAt(0),0)*17+999;
  function rand2(max){rng2=(rng2*1664525+1013904223)&0xffffffff;return Math.abs(rng2)%max;}
  const COMPANIES=['JPMorgan Chase','Goldman Sachs','Fidelity Investments','Stripe','Google','Salesforce','Morgan Stanley','Barclays','Adobe','IBM'];
  const JOB_TITLES=['Senior UX Engineer','Lead Designer','Frontend Developer','Product Designer','Tech Lead','Staff Engineer','UX Researcher','Design Systems Lead'];
  const fmt=(y,m)=>new Date(y,m-1).toLocaleDateString(undefined,{year:'numeric',month:'short'});
  const used=new Set();let html='',endY=2025,endM=1;
  for(let i=0;i<2+rand2(2);i++){
    let co;do{co=COMPANIES[rand2(COMPANIES.length)];}while(used.has(co));used.add(co);
    const jt=JOB_TITLES[rand2(JOB_TITLES.length)];
    const durY=1+rand2(3),durM=rand2(12);
    const fromY=endY-durY,fromM=endM-durM<1?12:endM-durM;
    const ini2=co.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const isCurrent=i===0;
    html+='<div class="work-item"><div class="work-logo">'+esc(ini2)+'</div><div class="work-info"><div class="work-company">'+esc(co)+'</div><div class="work-role">'+esc(jt)+'</div><div class="work-dates">'+fmt(fromY,Math.max(1,fromM))+' - '+(isCurrent?'Present':fmt(endY,endM))+'</div></div>'+(isCurrent?'<span style="font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px;background:rgba(26,107,204,.1);color:var(--primary)">Current</span>':'')+'</div>';
    endY=fromY;endM=Math.max(1,fromM);
  }
  document.getElementById('work-history').innerHTML=html;
})();
</script>
</body>
</html>
