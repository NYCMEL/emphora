<!--
  Place at: public/profile.html
  Emphora — My Profile (Personal Info only)
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Emphora — My Profile</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --primary:#1A6BCC; --bg:#F0F4F8; --surface:#fff; --surface2:#F8FAFC;
      --border:#D0DCE8; --text:#0D1B2A; --muted:#7A8FA6;
      --success:#2E7D32; --danger:#C62828;
    }
    [data-theme="dark"] {
      --bg:#0A0F1A; --surface:#111827; --surface2:#1A2236;
      --border:rgba(255,255,255,.10); --text:#E8F1FF; --muted:#5C7389;
    }
    body { font-family:'Plus Jakarta Sans',system-ui,sans-serif; font-size:14px; background:var(--bg); color:var(--text); min-height:100vh; transition:background .2s,color .2s; }

    /* ── TOPBAR ── */
    .topbar { position:sticky; top:0; z-index:100; height:54px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 1.25rem; gap:0; }
    .logo { font-family:'DM Serif Display',Georgia,serif; font-style:italic; font-size:1.3rem; color:var(--primary); text-decoration:none; flex-shrink:0; }
    .logo b { color:#00897B; font-weight:400; }
    .bc-sep { color:var(--border); margin:0 8px; font-size:.85rem; user-select:none; flex-shrink:0; }
    .bc-link { font-size:.8rem; color:var(--muted); text-decoration:none; transition:color .15s; white-space:nowrap; }
    .bc-link:hover { color:var(--primary); }
    .bc-current { font-size:.8rem; color:var(--text); font-weight:600; white-space:nowrap; }
    .spacer { flex:1; }
    .icon-btn { width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; text-decoration:none; flex-shrink:0; }
    .icon-btn:hover { color:var(--primary); border-color:var(--primary); }
    .icon-btn .material-icons-round { font-size:1rem; }

    /* ── AVATAR HERO STRIP ── */
    .profile-hero-strip {
      background:var(--surface);
      border-bottom:1px solid var(--border);
      padding:2rem 2rem 1.5rem;
      display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap;
    }
    .profile-avatar-wrap { position:relative; cursor:pointer; flex-shrink:0; }
    .profile-avatar {
      width:90px; height:90px; border-radius:50%;
      background:var(--primary);
      display:flex; align-items:center; justify-content:center;
      font-family:'DM Serif Display',serif; font-size:2rem; color:#fff;
      border:3px solid var(--border);
      box-shadow:0 4px 18px rgba(0,0,0,.1);
      overflow:hidden;
      transition:filter .2s;
    }
    .profile-avatar-wrap:hover .profile-avatar { filter:brightness(.75); }
    .profile-avatar-overlay {
      position:absolute; inset:0; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity .2s; pointer-events:none;
      background:rgba(0,0,0,.35);
    }
    .profile-avatar-overlay .material-icons-round { font-size:1.5rem; color:#fff; }
    .profile-avatar-wrap:hover .profile-avatar-overlay { opacity:1; }
    .profile-hero-info { flex:1; min-width:0; }
    .profile-hero-name { font-family:'DM Serif Display',Georgia,serif; font-size:1.7rem; font-weight:400; }
    .profile-hero-sub  { font-size:.85rem; color:var(--muted); margin-top:4px; }
    .profile-hero-pills { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .profile-hero-pill {
      display:inline-flex; align-items:center; gap:4px;
      padding:3px 10px; border-radius:20px; font-size:.68rem; font-weight:700;
      background:rgba(26,107,204,.1); color:var(--primary); border:1px solid rgba(26,107,204,.2);
    }
    .profile-hero-pill .material-icons-round { font-size:.78rem; }

    /* ── FULL-WIDTH FORM ── */
    .profile-page { max-width:860px; margin:0 auto; padding:2rem 2rem 4rem; }

    .profile-actions-bar {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:1.5rem; flex-wrap:wrap; gap:10px;
    }
    .profile-page-title {
      font-family:'DM Serif Display',Georgia,serif;
      font-size:1.2rem; font-weight:400; color:var(--text);
    }
    .profile-btns { display:flex; gap:8px; align-items:center; }
    .profile-edit-btn {
      display:inline-flex; align-items:center; gap:5px;
      padding:6px 16px; border-radius:9px;
      border:1.5px solid var(--border); background:transparent;
      color:var(--muted); font:600 .8rem inherit; cursor:pointer; transition:all .15s;
    }
    .profile-edit-btn:hover { border-color:var(--primary); color:var(--primary); }
    .profile-edit-btn .material-icons-round { font-size:.88rem; }
    .profile-save-btn {
      display:inline-flex; align-items:center; gap:5px;
      padding:6px 18px; border-radius:9px;
      border:none; background:var(--primary); color:#fff;
      font:600 .8rem inherit; cursor:pointer; transition:filter .15s;
    }
    .profile-save-btn:hover { filter:brightness(1.1); }
    .profile-cancel-btn {
      display:inline-flex; align-items:center; gap:5px;
      padding:6px 14px; border-radius:9px;
      border:1.5px solid var(--border); background:transparent;
      color:var(--muted); font:600 .8rem inherit; cursor:pointer;
    }
    .profile-saved-tag { font-size:.74rem; color:var(--success); display:flex; align-items:center; gap:3px; opacity:0; transition:opacity .3s; }
    .profile-saved-tag.show { opacity:1; }
    .profile-saved-tag .material-icons-round { font-size:.85rem; }

    /* ── FIELD GRID ── */
    .profile-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem 2rem; }
    @media(max-width:560px) { .profile-grid { grid-template-columns:1fr; } }
    .profile-field { display:flex; flex-direction:column; gap:5px; }
    .profile-field.full { grid-column:1/-1; }
    .profile-label { font-size:.63rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); }
    .profile-value { font-size:.95rem; color:var(--text); font-weight:500; padding:2px 0; border-bottom:1px solid transparent; min-height:1.6em; }
    .profile-value.empty { color:var(--muted); font-style:italic; font-weight:400; }
    .profile-value a { color:var(--primary); }
    .profile-divider { grid-column:1/-1; border:none; border-top:1px solid var(--border); margin:.25rem 0; }

    /* inputs */
    .profile-input {
      padding:8px 12px; border:1.5px solid var(--border);
      border-radius:9px; background:var(--surface2); color:var(--text);
      font:inherit; font-size:.9rem; outline:none; width:100%;
      transition:border-color .15s;
    }
    .profile-input:focus { border-color:var(--primary); background:var(--surface); }
    textarea.profile-input { resize:vertical; min-height:90px; }
    .profile-input[readonly] { opacity:.6; cursor:default; }
  </style>
</head>
<body>

<!-- TOPBAR with full breadcrumb -->
<nav class="topbar">
  <a href="#" class="logo" id="nav-logo">Emph<b>ora</b></a>
    <span style="color:var(--border,#D0DCE8);margin:0 4px;font-size:.85rem;user-select:none">›</span>
    <a href="#" id="bc-dash" style="font-size:.8rem;color:var(--muted,#7A8FA6);text-decoration:none;white-space:nowrap" onmouseover="this.style.color='#1A6BCC'" onmouseout="this.style.color='var(--muted,#7A8FA6)'">Employee Dashboard</a>
    <span style="color:var(--border,#D0DCE8);margin:0 4px;font-size:.85rem;user-select:none">›</span>
    <span style="font-size:.8rem;font-weight:600;color:var(--text,#0D1B2A);white-space:nowrap">My Profile</span>
  <div class="spacer"></div>
    <a href="profile.html" title="Edit profile" style="display:flex;align-items:center;gap:8px;text-decoration:none;padding:3px 10px 3px 3px;border-radius:30px;transition:background .15s" onmouseover="this.style.background='rgba(0,0,0,.04)'" onmouseout="this.style.background='transparent'">
    <div style="display:flex;flex-direction:column;gap:0px;text-align:right">
      <span id="em-user-name" style="font-size:.82rem;font-weight:700;color:var(--text,#0D1B2A);line-height:1.25"></span>
      <span id="em-user-email" style="font-size:.68rem;color:var(--muted,#7A8FA6);line-height:1.25"></span>
    </div>
    <div id="em-user-avatar" style="opacity:0;width:28px;height:28px;border-radius:50%;background:#1A6BCC;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:#fff;flex-shrink:0"></div>
  </a>
  <button class="icon-btn" id="theme-btn" title="Toggle theme"><span class="material-icons-round">light_mode</span></button>
  <a href="#" class="icon-btn" id="back-btn" title="Back"><span class="material-icons-round">arrow_back</span></a>
</nav>

<!-- AVATAR HERO STRIP -->
<div class="profile-hero-strip">
  <div class="profile-avatar-wrap" id="avatar-wrap">
    <div class="profile-avatar" id="hero-avatar">?</div>
    <div class="profile-avatar-overlay"><span class="material-icons-round">add_a_photo</span></div>
  </div>
  <div class="profile-hero-info">
    <div class="profile-hero-name" id="hero-name">—</div>
    <div class="profile-hero-sub"  id="hero-sub">—</div>
    <div class="profile-hero-pills" id="hero-pills"></div>
  </div>
</div>

<!-- FULL-WIDTH PROFILE FORM -->
<div class="profile-page">
  <div class="profile-actions-bar">
    <div class="profile-page-title">Personal Information</div>
    <div class="profile-btns">
      <span class="profile-saved-tag" id="profile-saved-tag"><span class="material-icons-round">check_circle</span>Saved</span>
      <button class="profile-edit-btn" id="profile-edit-btn"><span class="material-icons-round">edit</span>Edit</button>
      <button class="profile-save-btn"   id="profile-save-btn"   style="display:none"><span class="material-icons-round">save</span>Save Changes</button>
      <button class="profile-cancel-btn" id="profile-cancel-btn" style="display:none">Cancel</button>
    </div>
  </div>
  <div class="profile-grid" id="profile-fields"></div>
</div>

<script>
'use strict';

const user = (() => { try { return JSON.parse(sessionStorage.getItem('emphora_user')||'null'); } catch { return null; } })();
if (!user) window.location.href = '/';

const DASH      = { employee:'employee.html', employer:'employer.html', researcher:'researcher.html', admin:'admin.html' };
const DASH_LABEL= { employee:'Employee Dashboard', employer:'Employer Dashboard', researcher:'Researcher Dashboard', admin:'Admin Dashboard' };
const dashPage  = DASH[user?.accountType] || 'employee.html';

// Breadcrumb + back
document.getElementById('nav-logo').href  = dashPage;
const bcDash = document.getElementById('bc-dash');
if(bcDash){ bcDash.href = dashPage; bcDash.textContent = DASH_LABEL[user?.accountType] || 'Dashboard'; }
const backBtn = document.getElementById('back-btn');
if(backBtn) backBtn.href = dashPage;

// Theme
let theme = localStorage.getItem('em-theme') || 'light';
function applyTheme(t) {
  theme=t; document.body.dataset.theme=t;
  document.querySelector('#theme-btn .material-icons-round').textContent = t==='dark'?'dark_mode':'light_mode';
  localStorage.setItem('em-theme',t);
}
applyTheme(theme);
document.getElementById('theme-btn').onclick = () => applyTheme(theme==='dark'?'light':'dark');

// ── User identity ─────────────────────────────────────────────────────────────
(function(){
  const u=(()=>{try{return JSON.parse(sessionStorage.getItem('emphora_user')||'null');}catch{return null;}})();
  if(!u) return;
  const fn=u.firstName||u.email?.split('@')[0]||'';
  const ln=u.lastName||'';
  const ini=((fn[0]||'')+(ln[0]||'')).toUpperCase()||'';
  const nameEl  =document.getElementById('em-user-name');
  const emailEl =document.getElementById('em-user-email');
  const avatarEl=document.getElementById('em-user-avatar');
  if(nameEl)   nameEl.textContent=(fn+' '+ln).trim();
  if(emailEl)  emailEl.textContent=u.email||'';
  if(avatarEl){avatarEl.textContent=ini;avatarEl.style.opacity='1';}
  try{const img=localStorage.getItem('emphora_avatar_'+u.email);if(img&&avatarEl){avatarEl.style.backgroundImage=`url(${img})`;avatarEl.style.backgroundSize='cover';avatarEl.style.backgroundPosition='center';avatarEl.style.color='transparent';}}catch(_){}
})();


function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Profile data ──────────────────────────────────────────────────────────────
const PKEY = `emphora_profile_${user.email}`;
let profile = {};
try { profile = JSON.parse(localStorage.getItem(PKEY)||'{}'); } catch(_) {}

// Auto-seed profile for emphora.dev accounts with no saved data
(function seedProfileIfEmpty(){
  if (!user.email.endsWith('@emphora.dev')) return;
  if (Number(user.emphoraScore||0) === 0) return; // skip blank accounts
  if (profile.phone || profile.location || profile.title) return; // already has data

  const LOCATIONS = ['San Francisco, CA','New York, NY','Austin, TX','Seattle, WA','Boston, MA','Chicago, IL','Denver, CO','Los Angeles, CA','Miami, FL','Portland, OR','Atlanta, GA','Remote'];
  const TITLES = ['Senior Software Engineer','Staff Engineer','Principal Engineer','Engineering Manager','Full-Stack Developer','Frontend Engineer','Backend Engineer','DevOps Engineer','Product Manager','UX Designer','Data Engineer','ML Engineer','Solutions Architect','CTO','VP of Engineering','Tech Lead'];
  const PHONES = ['(415) 555-','(212) 555-','(512) 555-','(206) 555-','(617) 555-','(312) 555-'];
  const SUMMARIES = [
    'Passionate technologist with a track record of delivering scalable systems and mentoring high-performing teams.',
    'Results-driven engineer focused on building robust, user-centric products that solve real-world problems.',
    'Collaborative problem-solver with deep expertise in distributed systems and a love for clean, maintainable code.',
    'Strategic technical leader bridging the gap between business goals and engineering execution.',
    'Curious and driven developer who thrives in fast-paced environments and embraces continuous learning.',
    'Experienced builder of products at scale, with a strong focus on reliability, performance, and developer experience.',
  ];

  // Stable RNG seeded by email
  let rng = user.email.split('').reduce((a,c)=>a+c.charCodeAt(0),0)*31;
  function rand(max){ rng=(rng*1664525+1013904223)&0xffffffff; return Math.abs(rng)%max; }

  const score = Number(user.emphoraScore||0);
  const phonePrefix = PHONES[rand(PHONES.length)];
  const phoneNum = String(1000+rand(9000)).slice(0,4);

  profile.firstName = profile.firstName || user.firstName || '';
  profile.lastName  = profile.lastName  || user.lastName  || '';
  profile.phone     = profile.phone    || (phonePrefix + phoneNum);
  profile.location  = profile.location || LOCATIONS[rand(LOCATIONS.length)];
  profile.title     = profile.title    || TITLES[rand(score>=80?6:score>=60?10:TITLES.length)];
  profile.summary   = profile.summary  || SUMMARIES[rand(SUMMARIES.length)];
  profile.linkedin  = profile.linkedin || ('https://linkedin.com/in/' + (user.firstName||'user').toLowerCase() + '-' + (user.lastName||'').toLowerCase().replace(/\s+/g,'-'));
  profile.website   = profile.website  || '';

  try { localStorage.setItem(PKEY, JSON.stringify(profile)); } catch(_){}
})();

profile.firstName = profile.firstName || user.firstName || '';
profile.lastName  = profile.lastName  || user.lastName  || '';
profile.email     = user.email || '';

const FIELDS = [
  { key:'firstName', label:'First Name',          type:'text',     readonly:false },
  { key:'lastName',  label:'Last Name',            type:'text',     readonly:false },
  { key:'email',     label:'Email Address',        type:'email',    readonly:true  },
  { key:'phone',     label:'Phone',                type:'tel',      readonly:false },
  { key:'location',  label:'Location',             type:'text',     readonly:false },
  { key:'linkedin',  label:'LinkedIn URL',         type:'url',      readonly:false },
  { key:'website',   label:'Website',              type:'url',      readonly:false },
  { key:'title',     label:'Job Title',            type:'text',     readonly:false },
  { divider: true },
  { key:'summary',   label:'Professional Summary', type:'textarea', readonly:false, full:true },
];

let editing = false;

function updateHero() {
  const fn  = profile.firstName || '';
  const ln  = profile.lastName  || '';
  const ini = ((fn[0]||'')+(ln[0]||'')).toUpperCase() || '?';
  document.getElementById('hero-name').textContent = `${fn} ${ln}`.trim() || '—';
  document.getElementById('hero-sub').textContent  = profile.title || user.email || '';
  const avatarEl = document.getElementById('hero-avatar');
  if (avatarEl && !avatarEl.dataset.img) avatarEl.textContent = ini;

  const pills = [];
  if (profile.location) pills.push(`<span class="profile-hero-pill"><span class="material-icons-round">location_on</span>${esc(profile.location)}</span>`);
  if (user.emphoraScore > 0) pills.push(`<span class="profile-hero-pill"><span class="material-icons-round">stars</span>${Number(user.emphoraScore).toFixed(1)} Score</span>`);
  if (user.isVerified) pills.push(`<span class="profile-hero-pill" style="background:rgba(46,125,50,.1);color:#2E7D32;border-color:rgba(46,125,50,.2)"><span class="material-icons-round">verified</span>Verified</span>`);
  document.getElementById('hero-pills').innerHTML = pills.join('');
}

function renderFields() {
  const grid = document.getElementById('profile-fields');
  grid.innerHTML = FIELDS.map(f => {
    if (f.divider) return '<hr class="profile-divider"/>';
    const val = profile[f.key] || '';
    if (editing) {
      return `<div class="profile-field${f.full?' full':''}">
        <label class="profile-label" for="pf-${f.key}">${f.label}</label>
        ${f.type==='textarea'
          ? `<textarea class="profile-input" id="pf-${f.key}" rows="4" ${f.readonly?'readonly':''}>${esc(val)}</textarea>`
          : `<input class="profile-input" type="${f.type}" id="pf-${f.key}" value="${esc(val)}" placeholder="${f.label}" ${f.readonly?'readonly':''}>`}
      </div>`;
    } else {
      const isUrl = f.type==='url' && val;
      return `<div class="profile-field${f.full?' full':''}">
        <div class="profile-label">${f.label}</div>
        <div class="profile-value${val?'':' empty'}">
          ${isUrl ? `<a href="${esc(val)}" target="_blank" rel="noopener">${esc(val)}</a>` : esc(val)||'Not set'}
        </div>
      </div>`;
    }
  }).join('');
}

document.getElementById('profile-edit-btn').addEventListener('click', () => {
  editing = true; renderFields();
  document.getElementById('profile-edit-btn').style.display  = 'none';
  document.getElementById('profile-save-btn').style.display  = '';
  document.getElementById('profile-cancel-btn').style.display = '';
  document.getElementById('profile-fields').querySelector('.profile-input:not([readonly])')?.focus();
});

document.getElementById('profile-save-btn').addEventListener('click', () => {
  FIELDS.filter(f=>f.key&&!f.readonly).forEach(f => {
    const el = document.getElementById(`pf-${f.key}`);
    if (el) profile[f.key] = el.value.trim();
  });
  try { localStorage.setItem(PKEY, JSON.stringify(profile)); } catch(_) {}
  editing = false; renderFields(); updateHero();
  document.getElementById('profile-edit-btn').style.display  = '';
  document.getElementById('profile-save-btn').style.display  = 'none';
  document.getElementById('profile-cancel-btn').style.display = 'none';
  const tag = document.getElementById('profile-saved-tag');
  tag.classList.add('show'); setTimeout(()=>tag.classList.remove('show'), 2200);
});

document.getElementById('profile-cancel-btn').addEventListener('click', () => {
  editing = false; renderFields();
  document.getElementById('profile-edit-btn').style.display  = '';
  document.getElementById('profile-save-btn').style.display  = 'none';
  document.getElementById('profile-cancel-btn').style.display = 'none';
});

updateHero();
renderFields();

// ── Avatar upload ─────────────────────────────────────────────────────────────
(function() {
  const avatarEl = document.getElementById('hero-avatar');
  const wrapEl   = document.getElementById('avatar-wrap');
  if (!avatarEl || !user) return;
  const key = `emphora_avatar_${user.email}`;
  function applyImg(data) {
    avatarEl.style.cssText += ';background-image:url('+data+');background-size:cover;background-position:center;color:transparent';
    avatarEl.dataset.img = '1';
  }
  try { const s=localStorage.getItem(key); if(s) applyImg(s); } catch(_) {}
  const input = Object.assign(document.createElement('input'), { type:'file', accept:'image/*', style:'display:none' });
  document.body.appendChild(input);
  wrapEl.addEventListener('click', ()=>input.click());
  input.addEventListener('change', ()=>{
    const file=input.files[0]; input.value='';
    if (!file||file.size>5*1024*1024) return;
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas'); c.width=c.height=200;
        const ctx=c.getContext('2d');
        const side=Math.min(img.width,img.height);
        ctx.beginPath(); ctx.arc(100,100,100,0,Math.PI*2); ctx.clip();
        ctx.drawImage(img,(img.width-side)/2,(img.height-side)/2,side,side,0,0,200,200);
        const data=c.toDataURL('image/jpeg',.88);
        try { localStorage.setItem(key,data); } catch(_) {}
        applyImg(data);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
})();
</script>
</body>
</html>
